{% extends "pharmacy/base.html" %}
{% block title %}মুছুন{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto">
  <div class="card card-body" style="text-align:center;padding:36px">
    <div style="font-size:44px;margin-bottom:14px">🗑️</div>
    <div style="font-family:'Space Mono',monospace;font-size:14px;color:var(--danger);margin-bottom:8px">নিশ্চিত করুন</div>
    <p style="color:var(--muted);margin-bottom:22px;font-size:14px"><strong style="color:var(--text)">{{ object }}</strong> — এটি মুছে ফেলতে চান? এই কাজ পূর্বাবস্থায় ফেরানো যাবে না।</p>
    <form method="post" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      {% csrf_token %}
      <a href="javascript:history.back()" class="btn btn-ghost" style="flex:1;justify-content:center">বাতিল</a>
      <button type="submit" class="btn btn-danger" style="flex:1;justify-content:center">হ্যাঁ, মুছুন</button>
    </form>
  </div>
</div>
{% endblock %}
